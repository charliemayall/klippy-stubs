repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check --fix
        entry: .venv/bin/ruff check --fix
        language: system
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format
        entry: .venv/bin/ruff format
        language: system
        types_or: [python, pyi]
      - id: ty-smoke-check
        name: ty check smoke_check.py
        entry: .venv/bin/ty check smoke_check.py
        language: system
        pass_filenames: false
        always_run: true
