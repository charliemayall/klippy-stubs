repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check --fix
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
      - id: ty-smoke-check
        name: ty check smoke_check.py
        entry: uv run ty check smoke_check.py
        language: system
        pass_filenames: false
        always_run: true
